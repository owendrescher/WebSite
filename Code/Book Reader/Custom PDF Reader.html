    // ====== EXPORT / IMPORT NOTES & STATE ======
    function downloadJSON(filename, dataObj) {
      const blob = new Blob([JSON.stringify(dataObj, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    }

    function exportNotes() {
      if (!currentDocId) {
        setStatus('No document.');
        return;
      }
      const notes = loadAllNotes();
      const highlights = loadAllHighlights();
      downloadJSON(`notes_${currentDocId}.json`, { notes, highlights });
      setStatus('Notes exported.');
    }

    function importNotesFromFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const obj = JSON.parse(e.target.result);
          if (obj.notes) saveAllNotes(obj.notes);
          if (obj.highlights) saveAllHighlights(obj.highlights);
          loadNotesForCurrentPage();
          setStatus('Notes imported.');
        } catch {
          setStatus('Invalid notes file.');
        }
      };
      reader.readAsText(file);
    }

    async function exportAllState() {
      let docs = [];
      try {
        docs = await getStoredDocs(true);
      } catch (storageError) {
        console.error(storageError);
        setStatus('Could not read saved PDFs for export.');
        return;
      }
      const state = {
        docs: {},
        bookmarks: {},
        bookmarksNamed: {},
        notes: {},
        highlights: {},
        drawings: {},
        stats: {},
        settings: {}
      };
      docs.forEach((doc) => {
        state.docs[doc.id] = {
          id: doc.id,
          name: doc.name,
          data: arrayBufferToBase64(doc.data),
          created: doc.created,
          lastOpened: doc.lastOpened
        };
      });
      Object.keys(state.docs).forEach(id => {
        state.bookmarks[id] = localStorage.getItem('pdfBookmark_' + id) || null;
        state.bookmarksNamed[id] = localStorage.getItem('pdfBookmarksNamed_' + id) || null;
        state.notes[id] = localStorage.getItem('pdfNotes_' + id) || null;
        state.highlights[id] = localStorage.getItem('pdfHighlights_' + id) || null;
        state.drawings[id] = localStorage.getItem('pdfDrawings_' + id) || null;
        state.stats[id] = localStorage.getItem('pdfStats_' + id) || null;
        state.settings[id] = localStorage.getItem('pdfSettings_' + id) || null;
      });
      downloadJSON('pdf_reader_state.json', state);
      setStatus('All state exported.');
    }

    function importAllStateFromFile(file) {
      const reader = new FileReader();
      reader.onload = async (e) => {
        try {
          const obj = JSON.parse(e.target.result);
          if (obj.docs) {
            const docs = Object.values(obj.docs);
            for (const doc of docs) {
              if (!doc || !doc.id) continue;
              const data = typeof doc.data === 'string' ? base64ToUint8Array(doc.data).buffer : doc.data;
              try {
                await withDocStore('readwrite', (store) => requestToPromise(store.put({
                  id: doc.id,
                  name: doc.name || 'Untitled PDF',
                  data,
                  created: doc.created || Date.now(),
                  lastOpened: doc.lastOpened || Date.now()
                })));
              } catch (storageError) {
                console.error(storageError);
                setStatus('State import could not save stored PDFs.');
                return;
              }
            }
          }
          Object.keys(obj.bookmarks || {}).forEach(id => {
            const v = obj.bookmarks[id];
            if (v == null) localStorage.removeItem('pdfBookmark_' + id);
            else localStorage.setItem('pdfBookmark_' + id, v);
          });
          Object.keys(obj.bookmarksNamed || {}).forEach(id => {
            const v = obj.bookmarksNamed[id];
            if (v == null) localStorage.removeItem('pdfBookmarksNamed_' + id);
            else localStorage.setItem('pdfBookmarksNamed_' + id, v);
          });
          Object.keys(obj.notes || {}).forEach(id => {
            const v = obj.notes[id];
            if (v == null) localStorage.removeItem('pdfNotes_' + id);
            else localStorage.setItem('pdfNotes_' + id, v);
          });
          Object.keys(obj.highlights || {}).forEach(id => {
            const v = obj.highlights[id];
            if (v == null) localStorage.removeItem('pdfHighlights_' + id);
            else localStorage.setItem('pdfHighlights_' + id, v);
          });
          Object.keys(obj.drawings || {}).forEach(id => {
            const v = obj.drawings[id];
            if (v == null) localStorage.removeItem('pdfDrawings_' + id);
            else localStorage.setItem('pdfDrawings_' + id, v);
          });
          Object.keys(obj.stats || {}).forEach(id => {
            const v = obj.stats[id];
            if (v == null) localStorage.removeItem('pdfStats_' + id);
            else localStorage.setItem('pdfStats_' + id, v);
          });
          Object.keys(obj.settings || {}).forEach(id => {
            const v = obj.settings[id];
            if (v == null) localStorage.removeItem('pdfSettings_' + id);
            else localStorage.setItem('pdfSettings_' + id, v);
          });
          setStatus('State imported. Reload tool to see changes.');
          populateRecentList();
        } catch {
          setStatus('Invalid state file.');
        }
      };
      reader.readAsText(file);
    }

    // ====== SIDEBAR RESIZE ======
    (function setupSidebarResize() {
      let dragging = false;
      let startX = 0;
      let startWidth = 0;
      sidebarResizer.addEventListener('mousedown', (e) => {
        dragging = true;
        startX = e.clientX;
        startWidth = sidebar.offsetWidth;
        document.body.style.userSelect = 'none';
      });
      document.addEventListener('mousemove', (e) => {
        if (!dragging) return;
        const dx = e.clientX - startX;
        let newWidth = startWidth + dx;
        newWidth = Math.max(230, Math.min(480, newWidth));
        sidebar.style.width = newWidth + 'px';
      });
      document.addEventListener('mouseup', () => {
        dragging = false;
        document.body.style.userSelect = '';
      });
    })();

    // ====== EVENTS ======
    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        hideStartupModal();
        loadPdfFromFile(file);
      }
    });

    newPdfBtn.addEventListener('click', () => {
      fileInput.click();
    });

    prevPageBtn.addEventListener('click', () => {
      queueRenderPage(currentPageNum - 1);
    });
    nextPageBtn.addEventListener('click', () => {
      queueRenderPage(currentPageNum + 1);
    });

    pageSlider.addEventListener('input', () => {
      const val = parseInt(pageSlider.value || '1', 10);
      pageSliderLabel.textContent = String(val);
    });
    pageSlider.addEventListener('change', () => {
      const val = parseInt(pageSlider.value || '1', 10);
      queueRenderPage(val);
    });

    zoomInBtn.addEventListener('click', () => {
      currentScale *= 1.2;
      renderPage(currentPageNum);
      const settings = loadSettings();
      settings.zoom = currentScale;
      saveSettings(settings);
    });
    zoomOutBtn.addEventListener('click', () => {
      currentScale /= 1.2;
      renderPage(currentPageNum);
      const settings = loadSettings();
      settings.zoom = currentScale;
      saveSettings(settings);
    });
    resetZoomBtn.addEventListener('click', () => {
      currentScale = 1.2;
      renderPage(currentPageNum);
      const settings = loadSettings();
      settings.zoom = currentScale;
      saveSettings(settings);
    });

    bookmarkBtn.addEventListener('click', toggleBookmarkForCurrentPage);
    continueBtn.addEventListener('click', jumpToBookmark);
    addNamedBookmarkBtn.addEventListener('click', addNamedBookmarkForCurrentPage);

    stickyNoteButton.addEventListener('click', () => {
      if (!pdfDoc) {
        setStatus('Load a PDF first.');
        return;
      }
      setStatus('Click somewhere on the page, then press "Save Note".');
    });

    saveNoteBtn.addEventListener('click', addNoteWithClickPosition);
    highlightNoteButton.addEventListener('click', addNoteFromSelection);
    noteFilterSelect.addEventListener('change', () => loadNotesForCurrentPage());

    pageContainer.addEventListener('click', (e) => {
      if (interactionMode) return;
      const rect = pageContainer.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      lastClickPosition = {
        xRatio: x / pdfCanvas.width,
        yRatio: y / pdfCanvas.height
      };
      setStatus('Click position stored for next note.');
    });

    viewerContainer.addEventListener('wheel', handleHorizontalTouchpadSwipe, { passive: false });
    viewerContainer.addEventListener('scroll', () => persistReadingPosition(), { passive: true });
    drawCanvas.addEventListener('pointerdown', beginFreeDraw);
    drawCanvas.addEventListener('pointermove', continueFreeDraw);
    drawCanvas.addEventListener('pointerup', endFreeDraw);
    drawCanvas.addEventListener('pointercancel', endFreeDraw);
    document.addEventListener('mouseup', () => {
      if (interactionMode !== 'highlight') return;
      setTimeout(() => addHighlightNoteFromSelection(false), 0);
    });

    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        performSearch(searchInput.value.trim());
      }
    });
    searchNextBtn.addEventListener('click', () => {
      if (!searchResults.length) performSearch(searchInput.value.trim());
      else searchNext();
    });
    searchPrevBtn.addEventListener('click', () => {
      if (!searchResults.length) performSearch(searchInput.value.trim());
      else searchPrev();
    });
    searchClearBtn.addEventListener('click', () => {
      clearSearchHighlights();
      searchInput.value = '';
      setStatus('');
    });

    exportNotesBtn.addEventListener('click', exportNotes);
    importNotesBtn.addEventListener('click', () => notesFileInput.click());
    notesFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) importNotesFromFile(file);
    });

    exportStateBtn.addEventListener('click', exportAllState);
    importStateBtn.addEventListener('click', () => stateFileInput.click());
    stateFileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) importAllStateFromFile(file);
    });

    lowInkToggle.addEventListener('change', () => {
      lowInkMode = lowInkToggle.checked;
      updateLowInkMode();
      const s = loadSettings();
      s.lowInk = lowInkMode;
      saveSettings(s);
    });

    notesFontSizeSelect.addEventListener('change', () => {
      const scale = parseFloat(notesFontSizeSelect.value || '0.85');
      notesList.style.fontSize = scale + 'rem';
      const s = loadSettings();
      s.notesFontScale = scale;
      saveSettings(s);
    });

    drawColorInput.addEventListener('input', () => {
      currentDrawColor = drawColorInput.value || '#ff5050';
      const s = loadSettings();
      s.drawColor = currentDrawColor;
      saveSettings(s);
      redrawDrawingsForCurrentPage(activeDrawStroke);
    });

    drawSizeInput.addEventListener('input', () => {
      currentDrawSize = Math.max(2, parseInt(drawSizeInput.value || '4', 10));
      drawSizeLabel.textContent = currentDrawSize + 'px';
      const s = loadSettings();
      s.drawSize = currentDrawSize;
      saveSettings(s);
      redrawDrawingsForCurrentPage(activeDrawStroke);
    });

    twoPageToggle.addEventListener('change', () => {
      setStatus('Two-page mode not implemented yet (stub).');
    });

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && !isTypingTarget(e.target)) {
        const lowerKey = e.key.toLowerCase();
        if (lowerKey === 'z') {
          e.preventDefault();
          undoEditAction();
          return;
        }
        if (lowerKey === 'y') {
          e.preventDefault();
          redoEditAction();
          return;
        }
      }

      if (isTypingTarget(e.target)) return;
      if (!pdfDoc) return;
      if (e.key === 'ArrowRight') {
        queueRenderPage(currentPageNum + 1);
      } else if (e.key === 'ArrowLeft') {
        queueRenderPage(currentPageNum - 1);
      } else if (e.key === 'h' || e.key === 'H') {
        e.preventDefault();
        setInteractionMode('highlight');
      } else if (e.key === 'd' || e.key === 'D') {
        e.preventDefault();
        setInteractionMode('draw');
      } else if (e.key === 'b' || e.key === 'B') {
        toggleBookmarkForCurrentPage();
      } else if (e.key === 'c' || e.key === 'C') {
        jumpToBookmark();
      } else if (e.key === '/') {
        e.preventDefault();
        searchInput.focus();
      } else if (e.key === 'n' || e.key === 'N') {
        noteText.focus();
      }
    });

    noteText.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'Enter') {
        addNoteWithClickPosition();
      }
    });

    document.addEventListener('keydown', (e) => {
      if (e.ctrlKey && e.key === 'f') {
        e.preventDefault();
        searchInput.focus();
      }
    });

    window.addEventListener('load', () => {
      showStartupModal();
    });
    window.addEventListener('beforeunload', () => persistReadingPosition(true));
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        persistReadingPosition(true);
      }
    });
  </script>
</body>
</html>
