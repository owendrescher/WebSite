<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>owentools</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='18' fill='%2305070b'/%3E%3Cpath fill='%2317416f' fill-rule='evenodd' d='M23 18a14 14 0 1 0 0 28a14 14 0 1 0 0-28Zm0 8a6 6 0 1 1 0 12a6 6 0 1 1 0-12Z'/%3E%3Crect x='39' y='18' width='8' height='28' rx='4' fill='%2317416f'/%3E%3Crect x='34' y='18' width='18' height='8' rx='4' fill='%2317416f'/%3E%3C/svg%3E" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=Syne:wght@500;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="ambient ambient-left"></div>
    <div class="ambient ambient-right"></div>
    <div class="grid-noise"></div>

    <main class="fullscreen-shell">
      <section class="launcher-grid" id="launcher-grid" aria-label="owentools launcher">
        <a class="tool-panel slot-a reveal" data-tool-index="0"></a>
        <a class="tool-panel slot-b reveal" data-tool-index="1"></a>
        <a class="tool-panel slot-c reveal" data-tool-index="2"></a>
        <a class="tool-panel slot-d reveal" data-tool-index="3"></a>
        <a class="tool-panel slot-e reveal" data-tool-index="4"></a>
        <a class="tool-panel slot-f reveal" data-tool-index="5"></a>
        <a class="tool-panel slot-g reveal" data-tool-index="6"></a>
        <a class="tool-panel slot-h reveal" data-tool-index="7"></a>
        <a class="tool-panel slot-i reveal" data-tool-index="8"></a>
        <a class="tool-panel slot-j reveal" data-tool-index="9"></a>
        <a class="tool-panel slot-k reveal" data-tool-index="10"></a>
        <a class="tool-panel slot-l reveal" data-tool-index="11"></a>
        <a class="tool-panel slot-m reveal" data-tool-index="12"></a>

        <section class="tool-core" aria-label="Launcher intro">
          <h1>owentools</h1>
          <p class="core-copy">Click any preview to open the full tool.</p>
        </section>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
