<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Article Screenshotter</title>

  <!-- Cropper.js -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.css">

  <style>
    :root{
      --bg:#0b1220;
      --panel:#0f1a2e;
      --panel2:#0c162a;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --border:rgba(255,255,255,.10);
      --border2:rgba(255,255,255,.14);
      --accent:#60a5fa;
      --accent2:#34d399;
      --danger:#fb7185;
      --shadow: 0 18px 50px rgba(0,0,0,.45);
      --radius:16px;
    }

    *{ box-sizing:border-box; }
    html,body{ height:100%; }
    body{
      margin:0;
      background: radial-gradient(1200px 800px at 20% 0%, #122548 0%, var(--bg) 55%);
      color:var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    }

    .wrap{
      max-width: 1200px;
      margin: 0 auto;
      padding: 22px 18px 40px;
    }

    .header{
      display:flex;
      gap:14px;
      align-items:flex-end;
      justify-content:space-between;
      flex-wrap:wrap;
      margin-bottom: 14px;
    }

    .title{
      display:flex;
      flex-direction:column;
      gap:6px;
    }
    .title h1{
      margin:0;
      font-size: 26px;
      letter-spacing:.2px;
    }
    .title p{
      margin:0;
      color:var(--muted);
      font-size: 14px;
    }

    .panel{
      background: linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      border:1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .controls{
      padding: 14px;
      display:grid;
      grid-template-columns: 1.6fr .7fr;
      gap:12px;
    }

    textarea{
      width:100%;
      min-height: 190px;
      resize: vertical;
      padding: 12px;
      border-radius: 14px;
      border:1px solid var(--border2);
      background: rgba(3, 7, 18, .55);
      color:var(--text);
      font-size: 14px;
      outline:none;
    }
    textarea::placeholder{ color: rgba(229,231,235,.45); }

    .right{
      display:flex;
      flex-direction:column;
      gap:12px;
    }

    .row{
      display:flex;
      gap:10px;
      align-items:center;
      flex-wrap:wrap;
    }

    button{
      appearance:none;
      border:1px solid var(--border2);
      background: rgba(96,165,250,.14);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 12px;
      font-weight: 650;
      cursor:pointer;
      transition: transform .06s ease, background .2s ease, border-color .2s ease;
    }
    button:hover{ background: rgba(96,165,250,.20); border-color: rgba(96,165,250,.35); }
    button:active{ transform: translateY(1px); }

    .ghost{
      background: rgba(255,255,255,.05);
    }
    .ghost:hover{
      background: rgba(255,255,255,.08);
      border-color: rgba(255,255,255,.22);
    }

    .good{
      background: rgba(52,211,153,.14);
    }
    .good:hover{
      background: rgba(52,211,153,.20);
      border-color: rgba(52,211,153,.35);
    }

    .link{
      display:none;
      color: var(--accent);
      text-decoration:none;
      font-weight:650;
    }
    .link:hover{ text-decoration:underline; }

    .toggle{
      display:flex;
      gap:10px;
      align-items:center;
      color:var(--muted);
      font-size: 13px;
      user-select:none;
    }
    .toggle input{
      width: 18px; height:18px;
      accent-color: var(--accent);
    }

    .status{
      padding: 12px 14px;
      border-top: 1px solid var(--border);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      white-space: pre-wrap;
      color: rgba(229,231,235,.92);
    }

    .thumbs{
      margin-top: 16px;
      display:grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 14px;
    }

    .card{
      border:1px solid var(--border);
      border-radius: 16px;
      overflow:hidden;
      background: rgba(255,255,255,.03);
    }
    .cardHead{
      padding: 10px 12px;
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:center;
      border-bottom:1px solid var(--border);
    }
    .cardHead a{
      color: var(--accent);
      text-decoration:none;
      font-weight:650;
      font-size: 13px;
      word-break: break-all;
    }
    .cardHead a:hover{ text-decoration:underline; }

    .chip{
      font-size: 12px;
      padding: 5px 8px;
      border:1px solid var(--border2);
      border-radius: 999px;
      color: var(--muted);
      background: rgba(0,0,0,.18);
    }

    .imgWrap{
      padding: 10px;
    }

    img.preview{
      width:100%;
      height:auto;
      display:block;
      border-radius: 12px;
      border:1px solid rgba(255,255,255,.08);
      background: rgba(0,0,0,.2);
    }

    .cardActions{
      padding: 10px 12px 12px;
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .fail{
      padding: 12px;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.3;
    }

    /* --- modal --- */
    .modalBack{
      position:fixed; inset:0;
      background: rgba(0,0,0,.66);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 9999;
    }
    .modal{
      width: min(1100px, 98vw);
      background: var(--panel2);
      border:1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .modalTop{
      padding: 12px 14px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid var(--border);
    }
    .modalTop b{ font-size: 14px; }
    .modalBody{
      padding: 14px;
      display:grid;
      grid-template-columns: 1fr;
      gap: 12px;
    }
    .cropArea{
      background: rgba(0,0,0,.25);
      border:1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      padding: 10px;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
    }
    .cropArea img{
      max-width: 100%;
      max-height: 70vh;
      display:block;
    }
    .modalBtns{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    @media (max-width: 900px){
      .controls{ grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="header">
      <div class="title">
        <h1>Article Screenshotter</h1>
        <p>Cookie-accept only → full-page screenshots → preview → optional Instagram square crop.</p>
      </div>
    </div>

    <div class="panel">
      <div class="controls">
        <div>
          <textarea id="urls" placeholder="Paste one URL per line&#10;https://example.com/article1&#10;https://example.com/article2"></textarea>
        </div>

        <div class="right">
          <div class="row">
            <button id="go">Generate</button>
            <a id="zipLink" class="link" href="#" download>Download ZIP</a>
          </div>

          <div class="row">
            <label class="toggle"><input type="checkbox" id="headful">Show browser (debug)</label>
          </div>

          <div class="row">
            <button id="clear" class="ghost">Clear</button>
            <button id="demo" class="ghost">Load demo URLs</button>
          </div>

          <div style="color:var(--muted);font-size:13px;line-height:1.35">
            Tip: if a site blocks screenshots behind a paywall, we can only capture what the browser can render.
          </div>
        </div>
      </div>

      <div id="status" class="status">Ready.</div>
    </div>

    <div id="thumbs" class="thumbs"></div>
  </div>

  <!-- Crop Modal -->
  <div id="modalBack" class="modalBack" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modalTop">
        <b id="modalTitle">Crop to Instagram Square (1080×1080)</b>
        <button id="closeModal" class="ghost">Close</button>
      </div>
      <div class="modalBody">
        <div class="cropArea">
          <img id="cropImg" alt="">
        </div>
        <div class="modalBtns">
          <button id="downloadCrop" class="good">Download 1080×1080</button>
          <button id="downloadCropHi" class="ghost">Download original crop size</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/cropperjs@1.6.2/dist/cropper.min.js"></script>
  <script>
    const $ = (id) => document.getElementById(id);

    let cropper = null;
    let currentCropName = "crop.png";

    function setStatus(s){ $("status").textContent = s; }

    function openCropModal(imgUrl, suggestedName){
      $("modalBack").style.display = "flex";
      $("cropImg").src = imgUrl;
      currentCropName = suggestedName || "crop.png";

      // destroy old cropper
      if (cropper) { cropper.destroy(); cropper = null; }

      // wait for image load
      $("cropImg").onload = () => {
        cropper = new Cropper($("cropImg"), {
          viewMode: 1,
          dragMode: "move",
          autoCropArea: 0.9,
          aspectRatio: 1,          // Instagram square
          movable: true,
          zoomable: true,
          scalable: false,
          rotatable: false,
          responsive: true,
          background: false,
        });
      };
    }

    function closeCropModal(){
      if (cropper) { cropper.destroy(); cropper = null; }
      $("modalBack").style.display = "none";
      $("cropImg").src = "";
    }

    function downloadBlob(blob, name){
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(a.href), 1500);
    }

    $("closeModal").addEventListener("click", closeCropModal);
    $("modalBack").addEventListener("click", (e) => {
      if (e.target === $("modalBack")) closeCropModal();
    });

    $("downloadCrop").addEventListener("click", async () => {
      if (!cropper) return;

      const canvas = cropper.getCroppedCanvas({
        width: 1080,
        height: 1080
      });

      canvas.toBlob((blob) => {
        if (!blob) return;
        const name = currentCropName.replace(/\.png$/i, "") + "__IG1080.png";
        downloadBlob(blob, name);
      }, "image/png");
    });

    $("downloadCropHi").addEventListener("click", async () => {
      if (!cropper) return;

      const canvas = cropper.getCroppedCanvas(); // native crop resolution
      canvas.toBlob((blob) => {
        if (!blob) return;
        const name = currentCropName.replace(/\.png$/i, "") + "__crop.png";
        downloadBlob(blob, name);
      }, "image/png");
    });

    $("clear").addEventListener("click", () => {
      $("urls").value = "";
      $("thumbs").innerHTML = "";
      $("zipLink").style.display = "none";
      $("zipLink").href = "#";
      setStatus("Cleared.");
    });

    $("demo").addEventListener("click", () => {
      $("urls").value = [
        "https://example.com/",
        "https://example.org/"
      ].join("\n");
      setStatus("Loaded demo URLs. Replace with your articles.");
    });

    $("go").addEventListener("click", async () => {
      $("thumbs").innerHTML = "";
      $("zipLink").style.display = "none";
      $("zipLink").href = "#";

      const urls = $("urls").value;
      if (!urls.trim()) {
        setStatus("No URLs provided.");
        return;
      }

      setStatus("Running…");

      const res = await fetch("/api/run", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ urls, headful: $("headful").checked })
      });

      const data = await res.json();
      if (!res.ok) {
        setStatus("Error: " + (data.error || res.statusText));
        return;
      }

      setStatus(
        `Folder: ${data.folder}\n` +
        data.images.map(x => x.error ? `FAIL  ${x.url}\n  -> ${x.error}` : `OK    ${x.url}\n  -> ${x.file}`).join("\n")
      );

      $("zipLink").href = data.zip_url;
      $("zipLink").style.display = "inline";

      for (const item of data.images) {
        const card = document.createElement("div");
        card.className = "card";

        if (item.error) {
          card.innerHTML = `<div class="fail"><b>Failed</b><div style="margin-top:6px">${item.url}</div><div style="margin-top:6px">${item.error}</div></div>`;
          $("thumbs").appendChild(card);
          continue;
        }

        const shortName = item.file.split("/").pop();
        card.innerHTML = `
          <div class="cardHead">
            <a href="${item.img_url}" target="_blank" rel="noopener">${shortName}</a>
            <span class="chip">full page</span>
          </div>
          <div class="imgWrap">
            <img class="preview" src="${item.img_url}" alt="preview">
          </div>
          <div class="cardActions">
            <button class="ghost" data-open="${item.img_url}" data-name="${shortName}">Open</button>
            <button class="good" data-crop="${item.img_url}" data-name="${shortName}">Crop (IG square)</button>
          </div>
        `;

        // wire buttons
        card.querySelector("[data-open]").addEventListener("click", (e) => {
          window.open(e.currentTarget.dataset.open, "_blank");
        });

        card.querySelector("[data-crop]").addEventListener("click", (e) => {
          openCropModal(e.currentTarget.dataset.crop, e.currentTarget.dataset.name);
        });

        $("thumbs").appendChild(card);
      }
    });
  </script>
</body>
</html>
